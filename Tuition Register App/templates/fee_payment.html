<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduNexa - Record Fee Payment</title>
  <link rel="icon" href="/static/img/LOGO.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/Reg.css" />
</head>
<body>
<input type="checkbox" id="toggleSidebar" hidden />
<div class="d-flex">
  <!-- Sidebar -->
  <div id="sidebar" class="sidebar bg-dark text-white p-3">
    <h5 class="text-center fw-bold mb-3">🏤 ADMINISTRATION</h5>
    <hr class="border-secondary my-2" />
    <ul class="nav flex-column mt-3">
      <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('index') }}">Registration</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="/students">Students List</a></li>
      <li class="nav-item"><a class="nav-link text-white active" href="/fee_payment">Fee Payment</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="/view_payments">View Payments</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="/attendance">Attendance</a></li>
            <li class="nav-item">
        <a class="nav-link text-white d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#courseDropdown" role="button">
          Course Management <i class="fas fa-chevron-down"></i>
        </a>
        <ul class="collapse show list-unstyled ps-3" id="courseDropdown">
          <li><a class="nav-link text-white" href="courses.html">Add Course</a></li>
          <li><a class="nav-link text-white" href="courselist.html">List Of Course</a></li>
        </ul>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#batchdropdown" role="button">
          Batch Management <i class="fas fa-chevron-down"></i>
        </a>
        <ul class="collapse show list-unstyled ps-3" id="batchdropdown">
          <li><a class="nav-link text-white" href="{{ url_for('batches_page') }}">Add Batch</a></li>
          <li><a class="nav-link text-white" href="{{ url_for('batchlist_page') }}">List Of Batches</a></li>
        </ul>
      </li>
    </ul>

  </div>

  <!-- Main Content -->
  <div id="main-content" class="flex-grow-1">
    <nav class="navbar navbar-dark bg-dark fixed-top custom-navbar">
      <div class="container-fluid">
        <label for="toggleSidebar" class="btn btn-outline-light me-3 mb-0">&#9776;</label>
        <a class="navbar-brand" href="#">
          <img src="/static/img/NAVLOGO.png" alt="EduNexa Logo" width="30" height="30" class="me-2" /> EduNexa
        </a>
      </div>
    </nav>

    <div class="container pt-5 mt-5">
      <div class="registration-box bg-light p-4 rounded shadow">
        <h3 class="text-center text-primary mb-4">Record Fee Payment</h3>

        <form id="feePaymentForm" method="POST" action="{{ url_for('fee_payment') }}">
          <!-- Hidden Enrollment ID -->
          <div class="row mb-3">
          <div class="col md-6">
            <label for="enrollment_id" class="form-label">Select Student</label>
            <select class="form-select" id="enrollment_id" name="enrollment_id" onchange="fillStudentDetails()" required>
                <option value="">-- Select Student --</option>
                {% for s in students %}
                <option 
                    value="{{ s[0] }}" 
                    data-student-id="{{ s[1] }}"
                    data-name="{{ s[2] }}" 
                    data-course="{{ s[3] }}" 
                    data-fee="{{ s[5] }}" 
                    data-batch="{{ s[6] }}"
                >
                    {{ s[2] }}
                </option>
                {% endfor %}
            </select>

          </div>

            <div class="col-md-6">
              <label for="student_id_display" class="form-label">Student ID</label>
              <input type="text" id="student_id_display" class="form-control" readonly>
              <input type="hidden" id="student_id" name="student_id">
            </div>

            <div class="col-md-6">
              <label for="course_name" class="form-label">Course Name</label>
              <input type="text" id="course_name" class="form-control" readonly>
              <input type="hidden" id="course_id" name="course_id">
            </div>

            <div class="col-md-6">
              <label for="course_fee" class="form-label">Course Fee</label>
              <input type="text" id="course_fee" class="form-control" readonly>
            </div>

            <div class="col-md-6">
              <label for="amount_input" class="form-label">Enter Amount (in INR)</label>
              <input type="number" class="form-control" id="amount_input" oninput="calculateBalance()" name="amount_paid" min="1" required>
            </div>

            <div class="col-md-6">
              <label for="month" class="form-label">Month Paid For</label>
              <input type="month" class="form-control" id="month" name="month" required>
            </div>

            <div class="col-md-6">
              <label for="balance_fee" class="form-label">Balance Course Fee (in INR)</label>
              <input type="number" class="form-control" id="balance_fee" name="balance_fee" readonly>
            </div>

            <div class="col-md-6">
              <label for="payment_mode" class="form-label">Payment Mode</label>
              <select id="payment_mode" name="payment_mode" class="form-select" required>
                <option value="">Select Mode</option>
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
                <option value="Online">Online</option>
              </select>
            </div>
          </div>

          <div class="d-flex justify-content-between mt-3">
            <button type="submit" class="btn btn-primary">Save Payment</button>
            <div>
              <a href="{{ url_for('view_payments') }}" class="btn btn-outline-secondary me-2">Go to View Payments Page</a>
              <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back to Main Page</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<input type="text" id="course_fee" class="form-control" readonly>
<input type="hidden" id="course_id" name="course_id">

<script>
function fillStudentDetails() {
  const select = document.getElementById("studentSelect");
  const selectedOption = select.options[select.selectedIndex];

  const studentId = selectedOption.getAttribute("data-student-id");
  const fullName = selectedOption.getAttribute("data-full-name");
  const courseName = selectedOption.getAttribute("data-course-name");
  const courseId = selectedOption.getAttribute("data-course-id");
  const courseFee = selectedOption.getAttribute("data-course-fee");

  document.getElementById("student_id_display").value = studentId || "";
  document.getElementById("student_id").value = studentId || "";

  document.getElementById("course_name").value = courseName || "";
  document.getElementById("course_id").value = courseId || "";

  document.getElementById("course_fee").value = courseFee || "";

  // Reset balance fee when student changes
  document.getElementById("amount_input").value = "";
  document.getElementById("balance_fee").value = "";
}

function calculateBalance() {
  const courseFee = parseFloat(document.getElementById("course_fee").value) || 0;
  const paid = parseFloat(document.getElementById("amount_input").value) || 0;
  const balance = Math.max(courseFee - paid, 0);
  document.getElementById("balance_fee").value = balance.toFixed(2);
}

document.addEventListener("DOMContentLoaded", () => {
  const today = new Date();
  const monthInput = document.getElementById("month");
  monthInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
});


</script>
<script>
function fillStudentDetails() {
  const select = document.getElementById("enrollment_id");
  const selectedOption = select.options[select.selectedIndex];

  const studentId = selectedOption.getAttribute("data-student-id");
  const fullName = selectedOption.getAttribute("data-name");
  const courseName = selectedOption.getAttribute("data-course");
  const courseId = selectedOption.getAttribute("data-course-id");  // You may not have this
  const courseFee = selectedOption.getAttribute("data-fee");

  document.getElementById("student_id_display").value = studentId || "";
  document.getElementById("student_id").value = studentId || "";

  document.getElementById("course_name").value = courseName || "";
  document.getElementById("course_id").value = courseId || "";

  document.getElementById("course_fee").value = courseFee || "";

  document.getElementById("amount_input").value = "";
  document.getElementById("balance_fee").value = "";
}

function calculateBalance() {
  const courseFee = parseFloat(document.getElementById("course_fee").value) || 0;
  const paid = parseFloat(document.getElementById("amount_input").value) || 0;
  const balance = Math.max(courseFee - paid, 0);
  document.getElementById("balance_fee").value = balance.toFixed(2);
}

document.addEventListener("DOMContentLoaded", () => {
  const today = new Date();
  const monthInput = document.getElementById("month");
  monthInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
